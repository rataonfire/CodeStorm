services:
  postgres:
    image: postgres:15-alpine
    container_name: recon-postgres
    environment:
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
      POSTGRES_DB: recon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/contracts/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon -d recon"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - recon_net

  redis:
    image: redis:7-alpine
    container_name: recon-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - recon_net

  ingestor:
    build:
      context: ./services/ingestor
      dockerfile: Dockerfile
    container_name: recon-ingestor
    environment:
      POSTGRES_URL: postgres://recon:recon@postgres:5432/recon?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      INGESTOR_PORT: "8080"
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - recon_net

  reconciler:
    build:
      context: ./matcher
      dockerfile: Dockerfile
    container_name: recon-reconciler
    environment:
      POSTGRES_URL: postgres://recon:recon@postgres:5432/recon?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      REDIS_STREAM_NAME: transactions:raw
      REDIS_CONSUMER_GROUP: reconciler
      REDIS_PUBSUB_CHANNEL: reconciliation.events
      HEALTH_ADDR: "0.0.0.0:8081"
      LOG_LEVEL: info
      RECONCILER_TIMEOUT_MS: "2000"
      RECONCILER_ESCALATION_MS: "10000"
      RECONCILER_DEDUP_WINDOW_MS: "600000"
      RECONCILER_TIMER_TICK_MS: "100"
      EXPECTED_SOURCES_COUNT: "3"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped
    networks:
      - recon_net

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: recon-api-gateway
    environment:
      POSTGRES_URL: postgres://recon:recon@postgres:5432/recon?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      API_PORT: "8090"
      LOG_LEVEL: info
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reconciler:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/healthz 2>/dev/null || curl -sf http://localhost:8090/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - recon_net

  scenario:
    build:
      context: ./services/scenario
      dockerfile: Dockerfile
    container_name: recon-scenario
    environment:
      REDIS_URL: redis://redis:6379/0
      SCENARIO_TPS: "5"
      SCENARIO_TX_TYPES: card,transfer
      SCENARIO_CURRENCY: UZS
      SCENARIO_AMOUNT_MIN: "10000"
      SCENARIO_AMOUNT_MAX: "10000000"
      SCENARIO_GATEWAY_FEE_PCT: "0.5"
      SCENARIO_BANK_FEE_PCT: "0.2"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - recon_net

  emulator-merchant:
    build:
      context: ./services/emulator-merchant
      dockerfile: Dockerfile
    container_name: recon-emulator-merchant
    environment:
      REDIS_URL: redis://redis:6379/0
      EMULATOR_INGESTOR_URL: http://ingestor:8080
      EMULATOR_PCT_MISSING: "0.05"
      EMULATOR_PCT_DUPLICATE: "0.02"
      EMULATOR_PCT_WRONG_AMOUNT: "0.03"
      EMULATOR_PCT_WRONG_FEE: "0.00"
      EMULATOR_DELAY_MS_MIN: "50"
      EMULATOR_DELAY_MS_MAX: "500"
    depends_on:
      ingestor:
        condition: service_healthy
      scenario:
        condition: service_started
    restart: unless-stopped
    networks:
      - recon_net

  emulator-gateway:
    build:
      context: ./services/emulator-gateway
      dockerfile: Dockerfile
    container_name: recon-emulator-gateway
    environment:
      REDIS_URL: redis://redis:6379/0
      EMULATOR_INGESTOR_URL: http://ingestor:8080
      EMULATOR_PCT_MISSING: "0.05"
      EMULATOR_PCT_DUPLICATE: "0.02"
      EMULATOR_PCT_WRONG_AMOUNT: "0.03"
      EMULATOR_PCT_WRONG_FEE: "0.03"
      EMULATOR_DELAY_MS_MIN: "50"
      EMULATOR_DELAY_MS_MAX: "500"
    depends_on:
      ingestor:
        condition: service_healthy
      scenario:
        condition: service_started
    restart: unless-stopped
    networks:
      - recon_net

  emulator-bank:
    build:
      context: ./services/emulator-bank
      dockerfile: Dockerfile
    container_name: recon-emulator-bank
    environment:
      REDIS_URL: redis://redis:6379/0
      EMULATOR_INGESTOR_URL: http://ingestor:8080
      EMULATOR_PCT_MISSING: "0.05"
      EMULATOR_PCT_DUPLICATE: "0.02"
      EMULATOR_PCT_WRONG_AMOUNT: "0.03"
      EMULATOR_PCT_WRONG_FEE: "0.03"
      EMULATOR_DELAY_MS_MIN: "50"
      EMULATOR_DELAY_MS_MAX: "500"
    depends_on:
      ingestor:
        condition: service_healthy
      scenario:
        condition: service_started
    restart: unless-stopped
    networks:
      - recon_net

  integration-tests:
    build:
      context: ./tests/integration
      dockerfile: Dockerfile
    container_name: recon-integration-tests
    environment:
      INGESTOR_URL: http://ingestor:8080
      API_GW_URL: http://api-gateway:8090
    depends_on:
      ingestor:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    profiles:
      - test
    networks:
      - recon_net

volumes:
  postgres_data:
  redis_data:

networks:
  recon_net:
    driver: bridge
