version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: recon-postgres
    environment:
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
      POSTGRES_DB: recon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon -d recon"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: recon-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Reconciler runs DB migrations at startup via sqlx::migrate!, so it must be
  # healthy before ingestor or api-gateway attempt to write/read data.
  reconciler:
    build: ./matcher
    container_name: recon-reconciler
    environment:
      POSTGRES_URL: postgres://recon:recon@postgres:5432/recon?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
      HEALTH_ADDR: "0.0.0.0:8081"
      RECONCILER_TIMEOUT_MS: "2000"
      RECONCILER_ESCALATION_MS: "10000"
      RECONCILER_DEDUP_WINDOW_MS: "600000"
      RECONCILER_TIMER_TICK_MS: "100"
      EXPECTED_SOURCES_COUNT: "3"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/readyz"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  ingestor:
    build: ./services/ingestor
    container_name: recon-ingestor
    environment:
      POSTGRES_URL: postgres://recon:recon@postgres:5432/recon?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      INGESTOR_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reconciler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: recon-api-gateway
    environment:
      POSTGRES_URL: postgres://recon:recon@postgres:5432/recon?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      API_PORT: "8090"
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      reconciler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  scenario:
    build: ./services/scenario
    container_name: recon-scenario
    environment:
      REDIS_URL: redis://redis:6379/0
      SCENARIO_TPS: "1000"
      SCENARIO_TX_TYPES: "card,transfer"
      SCENARIO_CURRENCY: "UZS"
      SCENARIO_AMOUNT_MIN: "10000"
      SCENARIO_AMOUNT_MAX: "10000000"
      SCENARIO_GATEWAY_FEE_PCT: "0.5"
      SCENARIO_BANK_FEE_PCT: "0.2"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  emulator-merchant:
    build: ./services/emulator-merchant
    container_name: recon-emulator-merchant
    environment:
      REDIS_URL: redis://redis:6379/0
      EMULATOR_INGESTOR_URL: http://ingestor:8080
      EMULATOR_PCT_MISSING: "0.05"
      EMULATOR_PCT_DUPLICATE: "0.02"
      EMULATOR_PCT_WRONG_AMOUNT: "0.03"
      EMULATOR_PCT_WRONG_FEE: "0.00"
      EMULATOR_DELAY_MS_MIN: "50"
      EMULATOR_DELAY_MS_MAX: "800"
      EMULATOR_HEARTBEAT_INTERVAL_MS: "2000"
    depends_on:
      ingestor:
        condition: service_healthy
      scenario:
        condition: service_started
    restart: unless-stopped

  emulator-gateway:
    build: ./services/emulator-gateway
    container_name: recon-emulator-gateway
    environment:
      REDIS_URL: redis://redis:6379/0
      EMULATOR_INGESTOR_URL: http://ingestor:8080
      EMULATOR_PCT_MISSING: "0.05"
      EMULATOR_PCT_DUPLICATE: "0.02"
      EMULATOR_PCT_WRONG_AMOUNT: "0.03"
      EMULATOR_PCT_WRONG_FEE: "0.03"
      EMULATOR_DELAY_MS_MIN: "50"
      EMULATOR_DELAY_MS_MAX: "800"
      EMULATOR_HEARTBEAT_INTERVAL_MS: "2000"
    depends_on:
      ingestor:
        condition: service_healthy
      scenario:
        condition: service_started
    restart: unless-stopped

  emulator-bank:
    build: ./services/emulator-bank
    container_name: recon-emulator-bank
    environment:
      REDIS_URL: redis://redis:6379/0
      EMULATOR_INGESTOR_URL: http://ingestor:8080
      EMULATOR_PCT_MISSING: "0.05"
      EMULATOR_PCT_DUPLICATE: "0.02"
      EMULATOR_PCT_WRONG_AMOUNT: "0.03"
      EMULATOR_PCT_WRONG_FEE: "0.03"
      EMULATOR_DELAY_MS_MIN: "50"
      EMULATOR_DELAY_MS_MAX: "800"
      EMULATOR_HEARTBEAT_INTERVAL_MS: "2000"
    depends_on:
      ingestor:
        condition: service_healthy
      scenario:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: recon-frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped

  integration-tests:
    build: ./tests/integration
    container_name: recon-integration-tests
    profiles: [test]
    environment:
      INGESTOR_URL: http://ingestor:8080
      API_GW_URL: http://api-gateway:8090
    depends_on:
      ingestor:
        condition: service_healthy
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
